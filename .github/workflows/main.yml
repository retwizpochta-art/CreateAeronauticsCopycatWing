name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # позволяет запускать вручную из интерфейса Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Make gradlew executable
        run: chmod +x ./gradlew
        
      - name: Build with Gradle
        run: ./gradlew build
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-mod
          path: build/libs/*.jar
